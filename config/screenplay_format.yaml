'screenplay_format':
  'patterns':
  - '(?i)\b(?:drehbuch|screenplay|shooting\s+script|spec\s+script|umformatiert\s+in\s+fdx|besetzungsliste|vollständige[rs]?\s+[^.?!]{0,40}transkript|filmtranskripte)\b'
  - '(?im)^[^\S\r\n]*(?:BESETZUNG|VORSPANN|ABSPANN|(?:[IVX]+\.\s*)?AKT|SZENE\s+\d+)[^\S\r\n]*$'
  - '(?i)\b\d{1,2}x\d{2}\s*-\s*Folge\s+\d+\b'
  - '(?m)\A[^\r\n]{3,80},\s*(?:A|An|The)\s+\(\d{4}\)'
  - '(?im)^[^\S\r\n]*(?:BLENDE\s+(?:EIN|AUS)|ABBLENDE|AUFBLENDE|FADE\s+(?:IN|OUT)|CUT\s+TO|SCHNITT\s+ZU|ÜBERBLENDUNG)[^\S\r\n]*:?[^\S\r\n]*$'
  - '(?im)^[^\S\r\n]*(?:INNEN|AUSSEN|INT\.?|EXT\.?|I/E|INT/EXT)\.?\s+[^:\n]{3,100}[^\S\r\n]*(?:[-–—][^\S\r\n]*)?(?:TAG|NACHT|ABEND|MORGEN|MITTAG|DÄMMERUNG|DAEMMERUNG|SPÄTER|FORTSETZUNG)?[^\S\r\n]*$'
  - '(?i)\b(?:\d{1,3}\s+)?(?:INT\.?|EXT\.?|INNEN|AUSSEN|INT/EXT|I/E)\.?\s+[A-ZÄÖÜ0-9][^.?!\n]{3,90}\s+(?:[-–—]\s*)?(?:TAG|NACHT|ABEND|MORGEN|MITTAG|DÄMMERUNG|DAEMMERUNG|FORTSETZUNG)\b'
  - '(?im)^[^\S\r\n]*(?:\d{1,3}[^\S\r\n]+)?[A-ZÄÖÜ0-9][A-ZÄÖÜ0-9 .''’\-]{2,80},[^\S\r\n]*(?:INNEN|AUSSEN|DRINNEN|DRAUSSEN|DRAUßEN),[^\S\r\n]*(?:TAG|NACHT|ABEND|MORGEN|MITTAG|DÄMMERUNG|DAEMMERUNG)[^\S\r\n]*$'
  - '(?m)^[^\S\r\n]*(?:(?-i:[A-ZÄÖÜ][A-ZÄÖÜ0-9 #._''’\-]{2,45})|(?-i:[A-ZÄÖÜ][A-Za-zÄÖÜäöüß]+(?:-[A-ZÄÖÜ]?[A-Za-zÄÖÜäöüß]+)+[^\S\r\n]*#?\d+))[^\S\r\n]*$(?=\R[^\S\r\n]*(?:\([^)\n]{1,80}\)\R[^\S\r\n]*)?[A-ZÄÖÜa-zäöüß])'
  - '(?im)^[^\S\r\n]*\((?:zu\s+[^)\n]{1,60}|nickt|lächelt|lacht|flüstert|schreit|pause|beat|lehnt\s+sich[^)\n]{0,50}|sieht\s+[^)\n]{1,50})\)[^\S\r\n]*$'
  - '(?i)\((?:CONT''D|FORTSETZUNG|O\.S\.|OS|V\.O\.|VO|OFF)\)'
