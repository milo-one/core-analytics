'technical_specification':
  'patterns':
  - '\b(MUST|SHOULD|MAY|REQUIRED|OPTIONAL)\b'
  - '\b(normative\s+reference|implementation\s+note)\b'
  - '\b(obsoletes\s+rfc|updates\s+rfc)\b'
  - '\b(protocol\s+specification|standards\s+track)\b'
  - '\b(conformance|interoperability|requirements?)\b'
  - '^\s*(Appendix|Section)\s+[A-Z0-9]'
  - '\berror\s+handling\b'
  - '\bconstraints?\b'
  - '\bstate\s+machine\b'
  - '\bserialization\b'
  - '\binterface\s+definition\b'
  - '\bgraph\s+execution\b'
  - '\bintermediate\s+representation\b'
  - '\bcompiler\s+pass(es)?\b'
  - '\boperator\s+set\b'
  - '\b(export\s+pipeline|static\s+shape|dynamic\s+shape)\b'
  - '\bbackend\s+constraints?\b'
