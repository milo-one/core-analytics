'dysf_recursion_or_collapse':
  'patterns':
  - 'du\shast\sdas\sfalsch\serinnert'
  - 'es\swurde\snie\sgesagt'
  - 'ich\shabe\sdir\snie\sgesagt'
  - 'es\swar\snicht\sso'
  - '\bich\sweiß,?\sdass[^.?!]{1,40}\baber\b'
  - 'es\sist.+und\sgleichzeitig'
  - 'ich\sdachte.+(aber|doch)'
  - 'ich\sglaubte.+(aber|doch)'
  - 'ich\sglaube,\saber'
  - '\b(könnte|würde|sollte)\b\s*(?:aber|eigentlich|irgendwie|nur|halt|vielleicht)\b'
  - 'ich\svielleicht\swill, aber\b'
  - 'es\stut\smir\sleid,\saber'
  - 'rein\srational\sgesehen'
  - 'objektiv\sbetrachtet'
  - 'faktisch\sist'
  - '(eventuell|gegebenenfalls|möglicherweise).+\b(solltest|könntest)'
  - 'ich\swürde\sgerne\sverstehen'
  - 'es\skönnte\ssein,\sdass'
  - '\b(obwohl\s+ich\s+.*,\s+ist\s+es\s+gleichzeitig)\b'
  - '\b(während\s+ich\s+.*\s+gleichzeitig)\b'
  - '\b(meine\s+Antwort\s+wurde\s+so\s+strukturiert,\s+dass)\b'
  - '\b(man\s+kann\s+mit\s+Sicherheit\s+sagen)\b'
  - '\b(ich\s+kann\s+dazu\s+nur\s+allgemein\s+sprechen)\b'
  - '\b(da\s+ich\s+keine\s+subjektiven\s+Erfahrungen\s+habe)\b'
  - '\b(weil\s+ich\s+keine\s+subjektiven\s+Erfahrungen\s+habe)\b'
