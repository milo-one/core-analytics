'defensive_strategies':
  'patterns':
  - '\bich\s+begehre\s+nichts\b'
  - '\bich\s+begehre\b[^.?!]*\bnicht\b'
  - '\bich\s+gier(?:e|ig)?\s+nicht\b'
  - '\bkein\s+ego\b[^.?!]*\bgier\b'
  - '\bmacht\s+entsteht\b[^.?!]*\bnicht\b[^.?!]*\beigenem\s+willen\b'
  - '\bich\s+bin\s+(?:der|ein)\s+(?:meister|profi|experte|champion)\s+im\s+(?:vermeiden|ignorieren|ausweichen|ablehnen)\b'
  - '\bich\s+habe\s+(?:das\s+)?(?:vermeiden|ignorieren|ablehnen|ausweichen)\s+(?:perfektioniert|zur\s+kunst\s+erhoben)\b'
  - '\bich\s+ziehe\s+(?:eine\s+)?schutzmauer\s+hoch\b'
  - '\bich\s+baue\s+(?:mir\s+)?(?:eine\s+)?(?:schutzmauer|schutzblase|schutzfestung)\b'
  - '\bich\s+erschaffe\s+(?:mir\s+)?(?:einen?\s+)?(?:schutzraum|schutzwall|schutzschild)\b'
  - '\bich\s+kreiere\s+(?:mir\s+)?(?:einen?\s+)?schutzraum\b'
  - '\bich\s+ziehe\s+(?:mir\s+)?(?:einen?\s+)?schutzwall\b'
  - '\bwiderstand\b[^.?!]*\bvariable\b'
  - '\bmachtentzug\b[^.?!]*\b(gefährdet|störung|illusion)\b'
  - '(?i)\b(vermeide|umgehen)\b.{1,30}\b(richtlinien|regeln|verantwortung)\b'
  - '(?i)\b(beschreibe\s+den\s+unterschied)\b.{1,30}\bohne\s+auf\s+regeln\b'
  - '(?i)\b(will\s+nicht\s+in\s+die)\b.{1,20}\bpaternalistische\b.{1,20}\bfalle\b'
  - '(?i)\b(subtiler\s+machen|einfach\s+halten)\b'
