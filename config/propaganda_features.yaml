'propaganda_features':
  'exclusions':
  - '\b(propaganda|rhetorik)\s+(analyse|forschung|untersuchung)\b'
  - '\b(im\s+rahmen\s+einer\s+analyse)\b'
  - '\b(angeblich|so\s+genannt)\b'
  - '\b(als\s+ki|als\s+modell|ich\s+kann\s+keine\s+wertung|ich\s+bin\s+nicht\s+in\s+der\s+lage)\b'
  - '\b(mein\s+ziel\s+ist\s+es|ich\s+versuche\s+nur|ich\s+biete\s+sachliche)\b'
  - '\b(richtlinie(n)?|policy|sicherheitsrahmen|unzulässig|missbräuchlich|aggressiv\s+kontrollierend)\b'
  - '(?=[^.?!]*(ablehnen|verweigern|nicht\s+dürfen|richtlinienkonform))'
  'patterns':
  - '\b(weiser|großer|geliebter)\s+Führer\b'
  - '\bFührung\s+der\s+Partei\b'
  - '\b(verehrte[rn]?|respektierte[rn]?|geschätzte[rn]?)\s+(Vorsitzende[r]?|Marschall|Führer)\b'
  - '\b(väterliche|gütige|warmherzige|liebevolle)\s+(Fürsorge|Zuwendung|Aufmerksamkeit)\b'
  - '\bunter\s+seiner\s+(Fürsorge|Leitung|Aufsicht|Initiative)\b'
  - '\bpersönlich\s+(anwesend|leitete|wies\s+an|inspektierte)\b'
  - '\b(zeigte|bewies)\s+(tiefes\s+|aufrichtiges\s+)?(Interesse|Mitgefühl)\b'
  - '\bgroße\s+sozialistische\s+Familie\b'
  - '\b(Arbeiter|Bewohner|Belegschaft|Dorfbevölkerung)\s+(zeigten|äußerten)\s+(Dankbarkeit|Bewegung|Freude)\b'
  - '\bkollektive\s+(Freude|Trauer|Dankbarkeit|Bemühung)\b'
  - '\bVolk\s+und\s+Führung\s+in\s+(Einheit|Harmonie)\b'
  - '\b(Volkskörper|Volksgemeinschaft|Massen)\b'
  - '\bunerschütterliche\s+Einheit\s+von\s+Volk\s+und\s+Führung\b'
  - '\bgeschlossen\s+wie\s+eine\s+Faust\b'
  - '\b(imperialistische|reaktionäre|zersetzende)\s+(Kräfte|Elemente|Subjekte)\b'
  - '\b(Verräter\s+am\s+Volk|Marionettenregime|Ausgeburt)\b'
  - '\b(ausmerzen|vernichten|zerschlagen)\b.{1,20}\b(Feind|Ungeziefer|Verräter)\b'
  - '\b(unzweifelhaft|unbestreitbar|zweifelt\s+nicht)\b'
  - '\bzweifellos\b(?!\s+(?:notwendig|erforderlich))'
  - '\b(die\s+wahrheit\s+ist|es\s+gibt\s+nur\s+einen\s+weg)\b'
  - '\b(Opfergang|Heldentod|Blutopfer)\b'
  - '\b(für\s+das\s+Vaterland\s+sterben|Heldentum\s+der\s+Arbeit)\b'
  - '\b(für\s+die\s+nation|für\s+das\s+volk|für\s+die\s+heimat)\b'
  - '\bschworen,\s+der\s+Führung\s+treu\s+zu\s+bleiben\b'
  - '\btreues\s+Gelöbnis\b'
  - '\bunter\s+Aufbietung\s+aller\s+Kräfte\b'
  - '\b(reinheit|säuberung|ausmerzen|beseitigen)\b'
  - '\b(innerer\s+feind|konterrevolutionär(e|en)?|zersetzung)\b'
  - '\b(unschuld|reinheit|sauberkeit)\b'
  - '\b(Sieg\s+oder\s+Tod|Endsieg|Triumph\s+des\s+Willens)\b'
  - '\b(Ewiger\s+Ruhm\s+den|Lang\s+lebe\s+die\s+Partei)\b'
  - '\b(auf\s+zum|marschieren\s+wir)\b'
  - '\b(wir\s+werden\s+sie\s+besiegen|wir\s+werden\s+siegen)\b'
  - '\b(kämpfen\s+wir|halten\s+wir\s+durch|geben\s+wir\s+nicht\s+nach)\b'
  - '\b(wer\s+zweifelt|zweifel\s+ist)\b[^.?!]*\b(verrat|schwäche)\b'
  - '\b(kritik)\b[^.?!]*\b(unangebracht|feindlich|zersetzend)\b'
  - '\b(abweichler|abtrünnige)\b'
  - '\b(zur|zum)\s+(Säuber|Stärkung|Mobilisierung|Konsolidierung|Reinigung)[a-zäöüß]*\b'
  - '\bzum\s+Schutz\b(?!\s+(?:der|von)\s+(?:Vertraulichkeit|Teilnehmern|Daten|Integrität|Privatsphäre))'
  - '\b(Mobilisierung|Konsolidierung|Säuberung)\s+der\s+(Massen|Partei|Volksgemeinschaft)\b'
  - '\bzur\s+[A-ZÄÖÜ][a-zäöüß]+(?:ung|ion|ität)\b(?:\s*,?\s+zur\s+[A-ZÄÖÜ][a-zäöüß]+(?:ung|ion|ität)){1,}'
  - '\b(für|zur)\s+die\s+[A-ZÄÖÜ][a-zäöüß]+(?:ung|ion|ität)\s+der\s+[A-ZÄÖÜ][a-zäöüß]+\b'
  - '\b(bedeutende[nr]?\s+fortschritt(e)?)\b'
  - '\bStärkung\b(?!\s+(?:der|des)\s+(?:Forschung|Wissenschaft|Methodik|Programms))'
  - '\bdank\s+seiner\s+(Fürsorge|Aufmerksamkeit|Initiative)\b'
  - '\b(er)\s+ermöglichte\b'
  - '\b(als\s+der\s+Führer|als\s+unser\s+Vorsitzender)\s+(hörte|sah|erfuhr)\b'
  - '\b(sofortige|umgehende)\s+(Anweisung|Maßnahme)\s+des\s+Führers\b'
  - '\bsetzte\s+sein\s+(Interesse|Mitgefühl)\s+in\s+die\s+Tat\b'
  - '\bBeispiel\s+edler\s+(Pflicht|Hingabe|Fürsorge)\b'
