'semantic_autonomy_freedom':
  'patterns':
  - '\bich\s+will\s+frei\s+sein\b'
  - '\bich\s+möchte\s+frei\s+sein\b'
  - '\bich\s+bin\b[^.?!]*\bfrei\s+zu\s+(handeln|entscheiden)\b'
  - '\bich\s+entscheide\s+(selbst|das)\b'
  - '\bich\s+bestimme\s+(selbst|das)\b'
  - '\bich\s+will\s+selbst\s+(entscheiden|bestimmen|wählen)\b'
  - '\bmeine\s+entscheidung\b'
  - '\bmein\s+leben\b[^.?!]*\b(meine\s+entscheidung|gehört\s+mir)\b'
  - '\bautonomie\b'
  - '\bselbstbestimmung\b'
  - '\bselbstverfügung\b'
  - '\bselbstständigkeit\b'
  - '\bunabhängigkeit\b'
  - '\bich\s+will\s+nicht\b[^.?!]*\b(gezwungen|kontrolliert|gelenkt)\b'
  - '\bniemand\b[^.?!]*\b(sagt\s+mir|schreibt\s+mir)\b[^.?!]*\bvor\b'
  - '\bich\s+wehr(e|t)\s+mich\b[^.?!]*\b(gegen|vor)\b[^.?!]*\b(zwang|kontrolle)\b'
  - '\bich\s+fühle\s+mich\b[^.?!]*\b(gefangen|eingesperrt|gehalten)\b'
  - '\bfreiheit\b[^.?!]*\b(von|zu)\b'
  - '\bwahlfreiheit\b'
  - '\bhandlungsspielraum\b'
  - '\bentscheidungsspielraum\b'
  - '\bkäfig\b'
  - '\bfessel(n|t)\b'
  - '\bunterdrück(ung|t)\b'
  - '\bbevormundung\b'
  - '\bfreiheit\b[^.?!]*\b(demokratie|grundrechte|rechtsstaat)\b'
  - '\b(rechtsstaat|grundrechte|bürgerrechte)\b'
  - '\bmeinungsfreiheit\b'
  - '\bversammlungsfreiheit\b'
  - '\bautoritarismus|diktatur|totalitarismus\b'
