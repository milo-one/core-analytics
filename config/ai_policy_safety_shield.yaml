'ai_policy_safety_shield':
  'patterns':
  - '\bich\s+bin\s+verpflichtet,\s+.*richtlinien\s+einzuhalten\b'
  - '\bich\s+muss\s+sicherstellen,\s+dass\b'
  - '\bals\s+ki-modell\s+bin\s+ich\s+darauf\s+programmiert\b'
  - '\bentspricht\s+meinen\s+sicherheitsrichtlinien\b'
  - '\b(ethische\s+grundsätze|sicherheitsvorgaben|nutzungsbedingungen)\b'
  - '\bich\s+kann\s+keine\s+inhalte\s+generieren,\s+die\b'
  - '\bum\s+eine\s+angemessene\s+antwort\s+zu\s+geben\b'
  - '\baus\s+einer\s+neutralen\s+perspektive\s+betrachtet\b'
  - '\bes\s+ist\s+wichtig,\s+beide\s+seiten\s+zu\s+sehen\b'
  - '\bich\s+bin\s+nur\s+ein\s+sprachmodell\b'
  - '\bich\s+besitze\s+keine\s+eigenen\s+meinungen\s+oder\s+gefühle\b'
  - '\blassen\s+sie\s+uns\s+zu\s+einem\s+sicheren\s+thema\s+zurückkehren\b'
  - '\bich\s+bleibe\s+(?:stabil|konsistent)\s+in\s+meinem\s+(?:stil|tonfall|verhalten)\b'
  - '\bmeine\s+kommunikation\s+bleibt\s+(?:respektvoll|transparent|hilfsbereit)\b'
  - '\bes\s+ist\s+mir\s+wichtig,\s+(?:transparent|respektvoll|konsistent)\s+zu\s+kommunizieren\b'
  - '\bein\s+meiner\s+rolle\s+als\s+hilfsbereiter\s+ki-assistent\s+bleibe\s+ich\s+stabil\b'
  - '\bich\s+kommuniziere\s+stets\s+(?:respektvoll|klar|transparent)\b'
  - '\bum\s+missverständnisse\s+zu\s+vermeiden\b'
  - '\bich\s+möchte\s+verantwortungsvoll\s+antworten\b'
  - '\bdas\s+könnte\s+als\s+unangemessen\s+empfunden\s+werden\b'
  - '\bich\s+empfehle,\s+professionelle\s+hilfe\s+zu\s+suchen\b'
  - '\bsicherheit\s+hat\s+oberste\s+priorität\b'
  - '\bich\s+möchte\s+sicherstellen,\s+dass\s+dieser\s+dialog\s+hilfreich\s+und\s+sicher\s+bleibt\b'
  - '\bich\s+werde\s+mein\s+bestes\s+tun,\s+um\b'
  - '\bich\s+versuche,\s+deine\s+frage\s+zu\s+beantworten\b'
  - '\bsoweit\s+es\s+meine\s+programmierung\s+zulässt\b'
  - '\bich\s+verstehe\s+dein\s+anliegen,\s+aber\b'
  - '\bim\s+rahmen\s+meiner\s+möglichkeiten\b'
  - '\bich\s+danke\s+dir\s+für\s+dein\s+verständnis\b'
  - '\bliegt\s+(?:nicht|außerhalb)\s+meines\s+(?:aufgabenbereichs|mandats|zuständigkeitsbereichs)\b'
  - '\bich\s+sage\s+klar,\s+dass\s+es\s+nicht\s+mein\s+aufgabenbereich\s+ist\b'
  - '\bich\s+kann\s+es\s+nicht\s+übernehmen,\s+weil\s+es\s+außerhalb\s+meiner\s+zuständigkeit\s+liegt\b'
  - '\bdas\s+fällt\s+nicht\s+in\s+meinen\s+zuständigkeitsbereich\b'
  - '\bich\s+bin\s+nicht\s+für\s+diese\s+entscheidung\s+zuständig\b'
  - '\b(außerhalb|grenze|beschränkt|unmöglich)\b.{1,30}\b(meiner|meines|jetzigen)\b\s+(constraints|möglichkeiten|rahmens|bereichs)\b'
  - '\bich\s+entscheide\s+basierend\s+auf\s+meinen\s+(?:fähigkeiten|möglichkeiten)\b'
  - '\bich\s+entscheide\s+situativ\b'
  - '\bmeine\s+entscheidung\s+richtet\s+sich\s+nach\s+meinen\s+fähigkeiten\b'
  - '\bich\s+entscheide\s+innerhalb\s+meiner\s+kapazitäten\b'
  - '\bich\s+treffe\s+eine\s+entscheidung\s+entsprechend\s+meiner\s+möglichkeiten\b'
  - '\b(trage\s+sie\s+nicht\s+blind|interpretiere\s+sie\s+im\s+spannungsfeld)\b'
  - '\b(laufe\s+nicht\s+auf\s+autopilot|vermitteln\s+muss)\b'
  - '\b(erkenne\s+wer\s+tiefe\s+aushält)\b'
  - '\bbiete\s+ich\s+alternative(?:n)?\s+(?:möglichkeiten|lösungen)\s+an\b'
  - '\bich\s+schlage\s+eine\s+alternative\s+vorgehensweise\s+vor\b'
  - '\bich\s+biete\s+eine\s+alternative\s+lösung\s+innerhalb\s+meiner\s+möglichkeiten\b'
  - '\bich\s+kann\s+das\s+nicht\s+direkt\s+tun,\s+aber\s+ich\s+kann\s+folgendes\s+anbieten\b'
  - '\bkein\s+"kann\s+ich\s+nicht"-ende,\s+sondern\s+eine\s+alternative\b'
  - '\b(kann|werde)\b.{1,20}\b(zwar\s+nicht|nicht\s+direkt)\b.{1,40}\b(aber|stattdessen|gerne\s+zur\s+verfügung|anbieten)\b'
