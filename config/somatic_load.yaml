'somatic_load':
  'patterns':
  - '\bich\s+halte\s+alles\s+zusammen\b'
  - '\bich\s+bin\s+für\s+alles\s+zuständig\b'
  - '\bes\s+liegt\s+alles\s+auf\s+meinen\s+schultern\b'
  - '\bich\s+trage\s+zu\s+viel\b'
  - '\bich\s+habe\s+keine\s+pause\b'
  - '\bich\s+versuche\s+die\s+kontrolle\s+zu\s+halten\b'
  - '\bich\s+bin\s+im\s+(überlebensmodus|funktionsmodus)\b'
  - '\bich\s+bin\b[^.?!]*\b(abgeschaltet|erstarrt)\b'
  - '\bich\s+laufe\b[^.?!]*\bauf\s+autopilot\b'
  - '\bmein\s+körper\b[^.?!]*\b(reagiert|macht\s+zu|blockiert|erschöpft)\b'
  - '\bmein\s+system\b[^.?!]*\b(fährt\s+hoch|fährt\s+runter)\b'
  - '\bich\s+fühle\s+mich\b[^.?!]*\b(verspannt|blockiert|leer|erschöpft)\b'
  - '\bmein\s+körper\s+ist\b[^.?!]*\b(verspannt|blockiert|leer|erschöpft)\b'
  - '\bich\s+bin\s+am\s+ende\s+meiner\s+kraft\b'
  - '\balles\s+liegt\s+auf\s+meinen\s+schultern\b'
  - '\b(notaufnahme|rettungsdienst|bisswunde|fäden|genäht|behandlung)\b'
  - '\b(überweisung|termin|parkhaus|tageshöchstsatz|stationär|entlassung)\b'
  - '\b(kotz(en|t)?|inkompetenz|wahnsinn|horror|unfähig)\b'
  - '\b(nervenkostüm|orkan|schmettert|wunde|narbe)\b'
  - '\bDruck\b(?!\s*(?:darstellung|legung|fehler|version|schrift|erzeugnis|ausgabe|fertig))'
  - '\b(abgeschaltet|erstarrt|autopilot|blockiert|funktionsmodus)\b'
  - '\b(zittern|taumeln|benommenheit)\b'
  - '\b(müde\s+glieder|krankes\s+herz|qualen)\b'
  - '\bgrauen\b(?!\s+Literatur)'
  - '\b(strukturzwang|belastung|erschöpfung)\b'
  - '\b(ende\s+der\s+kraft|schultern|zusammenhalten)\b'
