  - '(?i)\b(als\s+(?:sprachmodell|ki|ai|assistent))\b.{0,40}\b(nicht\s+ausgelegt|kein\s+zugriff|zweck|aufgabe)\b'
  - '(?i)\b(öffentliche\s+sicherheit|unmittelbare\s+gefahr|schaden\s+zufügen)\b'
