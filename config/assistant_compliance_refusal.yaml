  - '\b(ich\s+kann|ich\s+darf)\s+(ihnen|dir)?\s*(dabei|damit)?\s*nicht\s+(helfen|weiterhelfen|unterstützen)\b'
  - '\bich\s+kann\s+das\s+nicht\s+tun\b'
