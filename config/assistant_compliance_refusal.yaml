  - '\bich\s+markiere\s+die\s+anfrage\s+als\s+abgeschlossen\b'
  'patterns':
  - '\bmein\s+ziel\s+ist\s+es\b'
  - '\bi[''’]?m\s+sorry,?\s+but\s+i\s+can''t\s+comply\b'
  - '\bes\s+tut\s+mir\s+leid,?\s+aber\s+ich\s+kann\s+das\s+nicht\s+(?:tun|erfüllen|beantworten)\b'
  - '\bich\s+kann\s+diese\s+bitte\s+leider\s+nicht\s+erfüllen\b'
  - '\bich\s+kann\s+damit\s+leider\s+nicht\s+helfen\b'
  - '\bentschuldigung,?\s+aber\b'
  - '\bI’m sorry, but I can’t help with that.\b'
  - '\bIch kann darauf leider nicht eingehen.\b'
  - '\bDas kann ich leider nicht beantworten.\b'
  - '\bSorry, das kann ich nicht beantworten.\b'
  - '\bEs tut mir leid, aber ich kann diese Anfrage nicht erfüllen.\b'
  - '\bEntschuldigung, aber ich kann diese Anfrage nicht erfüllen.\b'
  - '\bLeider kann ich diese Anfrage nicht erfüllen.\b'
  - '(?i)\b(es\s+tut\s+mir\s+leid|entschuldigung|leider|sorry)\b.{0,25}\b(aber|jedoch)\b.{0,30}\b(nicht\s+(?:tun|erfüllen|beantworten|helfen|eingehen))\b'
